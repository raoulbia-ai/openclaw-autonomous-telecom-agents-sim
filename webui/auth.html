<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autonomous Telecom Agents — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0f172a; font-family: system-ui, sans-serif;
    }
    .card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .title { color: #f1f5f9; font-size: 1.25rem; font-weight: 600; margin: 0 0 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.875rem; margin: 0 0 1.5rem; }
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; }
    .tab {
      flex: 1; padding: 0.6rem; text-align: center; cursor: pointer;
      color: #64748b; font-size: 0.875rem; font-weight: 500;
      border-bottom: 2px solid transparent; transition: all 0.15s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab.active { color: #818cf8; border-bottom-color: #6366f1; }
    .tab:hover:not(.active) { color: #94a3b8; }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block; color: #94a3b8; font-size: 0.75rem; font-weight: 500;
      margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em;
    }
    input {
      width: 100%; padding: 0.6rem 0.875rem; background: #0f172a;
      border: 1px solid #334155; border-radius: 8px; color: #f1f5f9;
      font-size: 0.95rem; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    button[type="submit"] {
      margin-top: 0.75rem; width: 100%; padding: 0.7rem; background: #6366f1;
      color: #fff; border: none; border-radius: 8px; font-size: 0.95rem;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #4f46e5; }
    button[type="submit"]:disabled { background: #475569; cursor: not-allowed; }
    .msg {
      margin-top: 0.75rem; font-size: 0.85rem; text-align: center;
      min-height: 1.2em;
    }
    .msg.error { color: #f87171; }
    .msg.success { color: #34d399; }
    .hidden { display: none; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <p class="title">Autonomous Telecom Agents</p>
    <p class="subtitle">Sign in or create a free account to continue.</p>

    <div class="tabs">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" autofocus required />
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input id="login-pass" type="password" placeholder="Your password" autocomplete="current-password" required />
      </div>
      <button type="submit">Sign In</button>
      <p class="msg" id="login-msg"></p>
    </form>

    <!-- Register form -->
    <form id="register-form" class="hidden">
      <div class="form-group">
        <label for="reg-name">Display Name</label>
        <input id="reg-name" type="text" placeholder="Optional" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="reg-pass">Password</label>
        <input id="reg-pass" type="password" placeholder="Min 6 characters" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit">Create Account</button>
      <p class="msg" id="reg-msg"></p>
    </form>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const loginForm = document.getElementById('login-form');
    const regForm = document.getElementById('register-form');

    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const isLogin = t.dataset.tab === 'login';
      loginForm.classList.toggle('hidden', !isLogin);
      regForm.classList.toggle('hidden', isLogin);
      document.querySelectorAll('.msg').forEach(m => { m.textContent = ''; m.className = 'msg'; });
    }));

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      if (type === 'error') {
        document.getElementById('card').classList.add('shake');
        setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          showMsg('login-msg', data.error || 'Invalid credentials', 'error');
        }
      } catch {
        showMsg('login-msg', 'Connection error', 'error');
      }
    });

    regForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-pass').value;
      const displayName = document.getElementById('reg-name').value;
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, displayName }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('reg-msg', 'Account created! Signing in...', 'success');
          // Auto-login
          const loginRes = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          if (loginRes.ok) {
            setTimeout(() => { window.location.href = '/'; }, 500);
          }
        } else {
          showMsg('reg-msg', data.error || 'Registration failed', 'error');
        }
      } catch {
        showMsg('reg-msg', 'Connection error', 'error');
      }
    });
  </script>
</body>
</html>
